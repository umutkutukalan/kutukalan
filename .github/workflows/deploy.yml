name: Kutukalan Portfolio Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - name: Deploy Frontend
      run: |
        rm -rf /opt/kutukalancom/frontend/*
        cp -r dist/* /opt/kutukalancom/frontend
